# fly.toml app configuration file generated for coordinator3000 on 2026-06-15T02:35:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'coordinator3000'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'INFO'
  WORKER_CONCURRENCY = '2'
  WORKSPACE_ROOT = '/tmp/c3000-workspaces'

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
