name: Deploy app + MCP (Fly.io)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - "fly.toml"
      - "deploy/fly.mcp.toml"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_GITHUB_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check Fly token
        id: cfg
        shell: bash
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy. Add it as a repo secret and run 'fly launch' once for each app." >> "$GITHUB_STEP_SUMMARY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.cfg.outputs.enabled == 'true'

      - name: Stage app secrets on the Fly apps
        if: steps.cfg.outputs.enabled == 'true'
        run: |
          for app in coordinator3000 coordinator3000-mcp; do
            [ -n "$DATABASE_URL" ]     && flyctl secrets set DATABASE_URL="$DATABASE_URL"      -a "$app" --stage || true
            [ -n "$APP_GITHUB_TOKEN" ] && flyctl secrets set GITHUB_TOKEN="$APP_GITHUB_TOKEN"   -a "$app" --stage || true
            [ -n "$ADMIN_TOKEN" ]      && flyctl secrets set ADMIN_TOKEN="$ADMIN_TOKEN"         -a "$app" --stage || true
          done

      - name: Deploy app
        if: steps.cfg.outputs.enabled == 'true'
        run: flyctl deploy --remote-only -c fly.toml

      # MCP is optional (the REST agent API covers the same ops); don't fail the
      # whole deploy if the coordinator3000-mcp app hasn't been created yet.
      - name: Deploy MCP server
        if: steps.cfg.outputs.enabled == 'true'
        continue-on-error: true
        run: flyctl deploy --remote-only -c deploy/fly.mcp.toml
